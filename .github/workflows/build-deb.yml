name: Build Debian Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Verify LFS files
        run: |
          echo "Checking LFS files..."
          if [ ! -f backend/worker/efficientnet/cnn_bundle.pkl ]; then
            echo "ERROR: cnn_bundle.pkl not found"
            exit 1
          fi

          # Check that files are real (not LFS pointers)
          pkl_size=$(stat -c%s backend/worker/efficientnet/cnn_bundle.pkl)

          echo "cnn_bundle.pkl size: ${pkl_size} bytes"

          if [ "$pkl_size" -lt 1000000 ]; then
            echo "ERROR: cnn_bundle.pkl appears to be an LFS pointer"
            exit 1
          fi

          echo "LFS files verified successfully"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          REACT_APP_API_BASE_URL=/api npm run build

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # For main branch pushes, auto-increment version from .version file
            CURRENT_VERSION=$(cat .version)
            # Split version into parts (MAJOR.MINOR.PATCH)
            IFS='.' read -ra PARTS <<< "$CURRENT_VERSION"
            MAJOR=${PARTS[0]}
            MINOR=${PARTS[1]}
            PATCH=${PARTS[2]}

            # Increment patch version
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"

            # Update version file
            echo "$VERSION" > .version

            echo "Incremented version: $CURRENT_VERSION → $VERSION"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build .deb package
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh ${{ steps.version.outputs.version }} ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharkid-deb-package-${{ matrix.arch }}
          path: build/sharkid_*.deb
          retention-days: 30

      - name: Commit version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.arch == 'amd64'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          # Commit version file
          git add .version
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"

          # Push commit (tag will be created by release action)
          git push origin HEAD:main

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Pull latest changes
        run: |
          git pull origin main

      - name: Get version
        id: version
        run: |
          VERSION=$(cat .version)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download AMD64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sharkid-deb-package-amd64
          path: ./packages

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sharkid-deb-package-arm64
          path: ./packages

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ./packages/*.deb
          generate_release_notes: true
          body: |
            ## SharkID v${{ steps.version.outputs.version }}

            ### Supported Architectures
            - AMD64 (x86_64)
            - ARM64 (aarch64)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
