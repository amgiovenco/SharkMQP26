services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - sharkid-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - sharkid-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: sharkid26-api
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - sharkid-data:/data

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    image: sharkid26-worker
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - sharkid-data:/data
      - ./backend/worker/efficientnet:/app/worker/efficientnet

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: sharkid26-nginx
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  sharkid-db:
  sharkid-redis:
  sharkid-data:
